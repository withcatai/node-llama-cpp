#            popd
#          fi
#
#          mkdir -p upx
#          tar -xvf "./upxInstallations/upx-${UPX_VERSION}-amd64_linux.tar.xz" -C ./upx
#          mv "./upx/upx-${UPX_VERSION}-amd64_linux" ./upx/upx
#
#          chmod +x ./bins/linux-x64-cuda/llama-addon.node
