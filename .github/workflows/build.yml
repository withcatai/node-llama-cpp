name: Build
on:
  push:
    branches:
      - master
      - beta
  pull_request:
  workflow_dispatch:


jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Install modules
        run: npm ci
      - name: Build
        run: npm run build
      - name: Download latest llama.cpp release
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node ./dist/cli/cli.js source download --release latest --skipBuild --noBundle --noUsageExample --updateBinariesReleaseMetadataAndSaveGitBundle
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          include-hidden-files: true
          name: "build"
          path: "dist"
      - name: Upload packed templates artifact
        uses: actions/upload-artifact@v7
        with:
          include-hidden-files: true
          name: "build-templates"
          path: "templates/packed"
      - name: Upload llama.cpp artifact
        uses: actions/upload-artifact@v7
        with:
          include-hidden-files: true
          name: "llama.cpp"
          path: |
            llama/binariesGithubRelease.json
            llama/llama.cpp.info.json
            llama/llama.cpp
            llama/gitRelease.bundle

  build-binaries:
    name: Build binaries - ${{ matrix.config.name }}
    needs:
      - build
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: "Windows (1)"
            os: windows-2022
            artifact: "win-1"
          - name: "Windows (2)"
            os: windows-2022
            artifact: "win-2"
          - name: "Ubuntu (1)"
            os: ubuntu-22.04
            artifact: "linux-1"
          - name: "Ubuntu (2)"
            os: ubuntu-22.04
            artifact: "linux-2"
          - name: "Ubuntu (arm64)"
            os: ubuntu-22.04-arm
            artifact: "linux-arm64"
          - name: "macOS x64"
            os: macos-15-intel
            artifact: "mac-x64"
          - name: "macOS arm64"
            os: macos-26
            artifact: "mac-arm64"
          - name: "Ubuntu riscv64"
            os: ubuntu-24.04-riscv
            artifact: "linux-riscv64"

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        if: matrix.config.artifact != 'linux-riscv64'
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install Node.js (riscv64 unofficial build)
        if: matrix.config.artifact == 'linux-riscv64'
        run: |
          set -e
          need=24.10.0
          if command -v node >/dev/null 2>&1; then
            cur="$(node -p 'process.versions.node')"
            if [ "$(printf '%s\n%s\n' "$need" "$cur" | sort -V | head -1)" = "$need" ]; then
              echo "Using preinstalled Node.js v$cur at $(command -v node)"
              exit 0
            fi
            echo "Preinstalled Node.js v$cur is older than $need; installing unofficial build"
          fi
          NODE_VER=v24.16.0
          curl -fsSL -o /tmp/node.tar.xz "https://unofficial-builds.nodejs.org/download/release/${NODE_VER}/node-${NODE_VER}-linux-riscv64.tar.xz"
          mkdir -p "$HOME/node"
          tar -xJf /tmp/node.tar.xz -C "$HOME/node" --strip-components=1
          echo "$HOME/node/bin" >> "$GITHUB_PATH"
          "$HOME/node/bin/node" --version

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build
          path: dist

      - name: Download llama.cpp artifact
        uses: actions/download-artifact@v8
        with:
          name: llama.cpp
          path: llama

      - name: Install dependencies on Windows
        if: startsWith(matrix.config.os, 'windows')
        run: |
          choco install cmake.install --version=4.2.1
          choco install cmake --version=4.2.1
          choco install ninja

      - name: Install dependencies on Ubuntu (1)
        if: matrix.config.name == 'Ubuntu (1)'
        run: |
          sudo apt-get update
          sudo apt-get install ninja-build libtbb-dev
          
          wget -c https://github.com/Kitware/CMake/releases/download/v4.2.1/cmake-4.2.1-linux-x86_64.tar.gz
          sudo tar --strip-components=1 -C /usr/local -xzf cmake-4.2.1-linux-x86_64.tar.gz
          rm -f ./cmake-4.2.1-linux-x86_64.tar.gz
          
          cmake --version

      - name: Install dependencies on Ubuntu (2)
        if: matrix.config.name == 'Ubuntu (2)'
        run: |
          sudo apt-get update
          sudo apt-get install ninja-build libtbb-dev
          
          wget -c https://github.com/Kitware/CMake/releases/download/v4.2.1/cmake-4.2.1-linux-x86_64.tar.gz
          sudo tar --strip-components=1 -C /usr/local -xzf cmake-4.2.1-linux-x86_64.tar.gz
          rm -f ./cmake-4.2.1-linux-x86_64.tar.gz
          
          cmake --version
      
      - name: Install dependencies on Ubuntu (arm64)
        if: matrix.config.name == 'Ubuntu (arm64)'
        env:
          LLVM_VERSION: 21
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh "${LLVM_VERSION}"
          
          sudo apt-get update
          sudo apt-get install -y ninja-build libtbb-dev "clang-${LLVM_VERSION}" "lld-${LLVM_VERSION}" "llvm-${LLVM_VERSION}" g++-arm-linux-gnueabihf gcc-arm-linux-gnueabihf

          sudo update-alternatives --install /usr/bin/cc cc "/usr/bin/clang-${LLVM_VERSION}" 100
          sudo update-alternatives --install /usr/bin/c++ c++ "/usr/bin/clang++-${LLVM_VERSION}" 100
          sudo update-alternatives --install /usr/bin/gcc gcc "/usr/bin/clang-${LLVM_VERSION}" 100
          sudo update-alternatives --install /usr/bin/g++ g++ "/usr/bin/clang++-${LLVM_VERSION}" 100
          
          wget -c https://github.com/Kitware/CMake/releases/download/v4.2.1/cmake-4.2.1-linux-aarch64.tar.gz
          sudo tar --strip-components=1 -C /usr/local -xzf cmake-4.2.1-linux-aarch64.tar.gz
          rm -f ./cmake-4.2.1-linux-aarch64.tar.gz
          
          cc --version
          c++ --version
          gcc --version
          g++ --version

          which arm-linux-gnueabihf-gcc
          which arm-linux-gnueabihf-g++
          
          cmake --version

      # llama.cpp's ggml-cpu uses the RVV _Float16 (zvfh) vector intrinsics,
      # which only exist in GCC 14+. The runner defaults to GCC 13, so make
      # gcc-14/g++-14 the default compilers (same as upstream build-riscv).
      - name: Install dependencies on Ubuntu riscv64
        if: matrix.config.name == 'Ubuntu riscv64'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential ninja-build libtbb-dev gcc-14 g++-14 retry
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
          cmake --version
          gcc --version

      - name: Install Cuda 13.1 on Windows (1)
        if: matrix.config.name == 'Windows (1)'
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '13.1.0'
          method: 'network'
          use-local-cache: false

      - name: Install Cuda 12.4 on Windows (2)
        if: matrix.config.name == 'Windows (2)'
        uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: '12.4.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust", "visual_studio_integration"]'
          use-local-cache: false

      - name: Install Cuda 13.1 on Ubuntu (1)
        if: matrix.config.name == 'Ubuntu (1)'
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '13.1.0'
          method: 'network'

      - name: Install Cuda 12.4 on Ubuntu (2)
        if: matrix.config.name == 'Ubuntu (2)'
        uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: '12.4.0'
          method: 'network'

      - name: Install Vulkan SDK on Windows (1)
        if: matrix.config.name == 'Windows (1)'
        shell: powershell
        env:
          VULKAN_VERSION: 1.4.313.2
        run: |
          # $env:VULKAN_VERSION = & curl.exe -fsSL https://vulkan.lunarg.com/sdk/latest/linux.txt
          # Write-Host "Downloading Vulkan SDK version $env:VULKAN_VERSION"
          
          curl.exe -o $env:RUNNER_TEMP/VulkanSDK-Installer.exe -L "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${env:VULKAN_VERSION}\bin"

      - name: Install Vulkan SDK on Ubuntu
        if: matrix.config.name == 'Ubuntu (1)'
        env:
          VULKAN_VERSION: 1.4.341.1
        run: |
          # export VULKAN_VERSION="$(curl -fsSL https://vulkan.lunarg.com/sdk/latest/linux.txt)"
          # echo "Downloading Vulkan SDK version ${VULKAN_VERSION}"
          
          sudo apt-get update
          sudo apt-get install xz-utils
          curl --no-progress-meter "https://sdk.lunarg.com/sdk/download/${VULKAN_VERSION}/linux/vulkan_sdk.tar.xz" -o "/opt/vulkan-sdk.tar.xz"
          mkdir -p "/opt/vulkan-sdk"
          tar -Jxf "/opt/vulkan-sdk.tar.xz" --strip-components=1 -C "/opt/vulkan-sdk"
          rm -f "/opt/vulkan-sdk.tar.xz"
          echo "VULKAN_SDK=/opt/vulkan-sdk/x86_64" >> $GITHUB_ENV
          echo "/opt/vulkan-sdk/x86_64/bin" >> $GITHUB_PATH

      - name: Install OpenVINO on Ubuntu (1)
        if: matrix.config.name == 'Ubuntu (1)'
        run: |
          sudo apt-get update
          # Install OpenCL runtime and development headers for Intel GPU support
          sudo apt-get install -y intel-opencl-icd ocl-icd-libopencl1 opencl-headers opencl-clhpp-headers ocl-icd-opencl-dev libtbb12 || true
          
          # Download and install the official OpenVINO C++ toolkit archive for Ubuntu 22.04 matching upstream
          curl -L https://storage.openvinotoolkit.org/repositories/openvino/packages/2026.2.1/linux/openvino_toolkit_ubuntu22_2026.2.1.21919.ede283a88e3_x86_64.tgz --output openvino.tgz
          tar -xf openvino.tgz
          
          # Export OPENVINO_DIR so CMake can find it natively
          openvinoDir="$(pwd)/openvino_toolkit_ubuntu22_2026.2.1.21919.ede283a88e3_x86_64/runtime"
          echo "OPENVINO_DIR=$openvinoDir" >> $GITHUB_ENV
          echo "OpenVINO_DIR=$openvinoDir" >> $GITHUB_ENV

      - name: Install OpenVINO on Windows (1)
        if: matrix.config.name == 'Windows (1)'
        shell: pwsh
        run: |
          # Download and install the official OpenVINO C++ toolkit archive for Windows matching upstream
          Invoke-WebRequest -Uri "https://storage.openvinotoolkit.org/repositories/openvino/packages/2026.2.1/windows/openvino_toolkit_windows_2026.2.1.21919.ede283a88e3_x86_64.zip" -OutFile "openvino.zip"
          Expand-Archive -Path openvino.zip -DestinationPath . -Force
          Remove-Item openvino.zip
          
          # Set environment variables
          $openvinoDir = "$pwd\openvino_toolkit_windows_2026.2.1.21919.ede283a88e3_x86_64\runtime"
          echo "OPENVINO_DIR=$openvinoDir" >> $env:GITHUB_ENV
          echo "OpenVINO_DIR=$openvinoDir" >> $env:GITHUB_ENV

      - name: Install dependencies on macOS
        if: matrix.config.name == 'macOS x64' || matrix.config.name == 'macOS arm64'
        run: |
          brew install cmake ninja
          alias make=cmake
          cmake --version
          uname -mprs

      - name: Setup & Build
        id: build
        shell: bash
        timeout-minutes: 300
        env:
          ARTIFACT_NAME: ${{ matrix.config.artifact }}
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: |
          if [ "$ARTIFACT_NAME" = "linux-riscv64" ]; then
            # The unofficial riscv64 Node runtime intermittently throws internal
            # TypeErrors during npm ci (e.g. "key.match is not a function")
            retry --times=3 npm ci
          else
            npm ci
          fi

          npx zx -y <<'EOF'
          
          async function getLatestNodeVersions(maxDate) {
            const res = await fetch("https://nodejs.org/dist/index.json");
            const data = await res.json();
            const versions = new Map();
            let latestVersion = null;
            
            for (const version of data) {
              const majorVersion = Number(version.version.split(".")[0].slice("v".length));
              const versionDate = new Date(version.date);
              
              if (maxDate != null && versionDate.getTime() > maxDate)
                continue;
              
              if (!versions.has(majorVersion)) {
                versions.set(majorVersion, version.version);
              }
              
              if (latestVersion === null || majorVersion > latestVersion) {
                latestVersion = majorVersion;
              }
            }
            
            return {versions, latestVersion};
          }
          
          const {versions: latestNodeVersions} = await getLatestNodeVersions(Date.now() - 1000 * 60 * 60 * 24 * 14);
          
          const nodeVersion = latestNodeVersions.get(20);
          const windowsOnArmNodeVersion = latestNodeVersions.get(20);
          
          if (nodeVersion == null || windowsOnArmNodeVersion == null) {
            throw new Error("Could not find node versions");
          }
          
          $.verbose = true;
          await $`mkdir -p bins`;
          
          async function buildBinary(arch, flags = [], nodeTarget = nodeVersion) {
            console.log(`Building ${arch} for node ${nodeTarget} with flags`, flags);
            
            await $`node ./dist/cli/cli.js source build --ciMode --noUsageExample --arch ${arch} --nodeTarget ${nodeVersion} ${flags}`;
          }
          
          // build binaries
          if (process.env.ARTIFACT_NAME === "win-1") {
            await buildBinary("x64", ["--gpu", "false"]);
            await buildBinary("x64", ["--gpu", "cuda"]);
            await buildBinary("x64", ["--gpu", "vulkan"]);
            await buildBinary("x64", ["--gpu", "openvino"]);
          } else if (process.env.ARTIFACT_NAME === "win-2") {
            await buildBinary("arm64", ["--gpu", "false"], windowsOnArmNodeVersion);
            await buildBinary("x64", ["--gpu", "cuda"]);
          } else if (process.env.ARTIFACT_NAME === "linux-1") {
            await buildBinary("x64", ["--gpu", "false"]);
            await buildBinary("x64", ["--gpu", "cuda"]);
            await buildBinary("x64", ["--gpu", "vulkan"]);
            await buildBinary("x64", ["--gpu", "openvino"]);
          } else if (process.env.ARTIFACT_NAME === "linux-2") {
            await buildBinary("x64", ["--gpu", "cuda"]);
          } else if (process.env.ARTIFACT_NAME === "linux-arm64") {
            await buildBinary("arm64", ["--gpu", "false"]);
            await buildBinary("armv7l", ["--gpu", "false"]);
          } else if (process.env.ARTIFACT_NAME === "mac-x64") {
            await buildBinary("x64", ["--gpu", "false"]);
          } else if (process.env.ARTIFACT_NAME === "mac-arm64") {
            await buildBinary("arm64", ["--gpu", "metal"]);
          } else if (process.env.ARTIFACT_NAME === "linux-riscv64") {
            await buildBinary("riscv64", ["--gpu", "false"]);
          }
          
          // move binaries to bins
          const localBuildsDirectoryPath = path.join(process.cwd(), "llama", "localBuilds");
          const llamaBinsDirectoryPath = path.join(process.cwd(), "bins");
          for (const folderName of await fs.readdir(localBuildsDirectoryPath)) {
            await fs.move(
              path.join(localBuildsDirectoryPath, folderName, "Release"),
              path.join(llamaBinsDirectoryPath, folderName)
            );
          }
          
          if (process.env.ARTIFACT_NAME === "win-2") {
            await fs.move(
              path.join(llamaBinsDirectoryPath, "win-x64-cuda"),
              path.join(llamaBinsDirectoryPath, "win-x64-cuda-2")
            );
            
            if (!(await fs.pathExists(path.join(llamaBinsDirectoryPath, "win-x64-cuda-2", "ggml-cuda.dll")))) {
              throw new Error("ggml-cuda.dll not found in win-x64-cuda-2");
            }
          } else if (process.env.ARTIFACT_NAME === "linux-2") {
            await fs.move(
              path.join(llamaBinsDirectoryPath, "linux-x64-cuda"),
              path.join(llamaBinsDirectoryPath, "linux-x64-cuda-2")
            );
            
            if (!(await fs.pathExists(path.join(llamaBinsDirectoryPath, "linux-x64-cuda-2", "libggml-cuda.so")))) {
              throw new Error("libggml-cuda.so not found in linux-x64-cuda-2");
            }
          }
          
          if (process.env.ARTIFACT_NAME === "linux-1" && process.env.OPENVINO_DIR) {
            try {
              const openVinoLibDir = path.join(process.env.OPENVINO_DIR, "lib", "intel64");
              const dest = path.join(llamaBinsDirectoryPath, "linux-x64-openvino");
              if ((await fs.pathExists(dest)) && (await fs.pathExists(openVinoLibDir))) {
                for (const file of await fs.readdir(openVinoLibDir)) {
                  if ((file.includes("libopenvino") && file.includes(".so")) || file.endsWith(".xml")) {
                    await fs.copy(path.join(openVinoLibDir, file), path.join(dest, file));
                  }
                }
              } else {
                console.warn(`[OpenVINO Bundler] Source or destination does not exist. Dest: ${dest}, Source: ${openVinoLibDir}`);
              }
            } catch (err) {
              console.error("[OpenVINO Bundler] Failed to copy linux openvino libraries:", err);
            }
          } else if (process.env.ARTIFACT_NAME === "win-1" && process.env.OPENVINO_DIR) {
            try {
              const openVinoBinDir = path.join(process.env.OPENVINO_DIR, "bin", "intel64", "Release");
              const dest = path.join(llamaBinsDirectoryPath, "win-x64-openvino");
              if ((await fs.pathExists(dest)) && (await fs.pathExists(openVinoBinDir))) {
                for (const file of await fs.readdir(openVinoBinDir)) {
                  if ((file.includes("openvino") && file.endsWith(".dll")) || file.endsWith(".xml")) {
                    await fs.copy(path.join(openVinoBinDir, file), path.join(dest, file));
                  }
                }
              } else {
                console.warn(`[OpenVINO Bundler] Source or destination does not exist. Dest: ${dest}, Source: ${openVinoBinDir}`);
              }
            } catch (err) {
              console.error("[OpenVINO Bundler] Failed to copy windows openvino libraries:", err);
            }
          }
          
          await $`echo "Built binaries:"`;
          await $`ls bins`;
          
          EOF

#      - name: Cache UPX
#        id: cache-upx
#        uses: actions/cache@v5
#        with:
