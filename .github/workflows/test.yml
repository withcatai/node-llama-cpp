name: Test
on:
  push:
    branches:
      - master
      - beta
  pull_request:
  workflow_dispatch:
    inputs:
      llama_cpp_release:
        description: "Exact llama.cpp release tag to test, for example b8681. Leave empty to use the most recent shipped tag or latest."
        type: string
        default: ""

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "24"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install modules
        run: npm ci --ignore-scripts
      - name: ESLint
        run: npx eslint
      - name: TypeScript validity
        run: npm run test:typescript

  compile-docs:
    name: Test docs compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Install modules
        run: npm ci --ignore-scripts
      - name: Build
        run: npm run build
      - name: Resolve llama.cpp release
        id: resolveLlamaCppRelease
        run: |
          resolved_release='${{ github.event_name == 'workflow_dispatch' && inputs.llama_cpp_release || '' }}'

          if [ -z "$resolved_release" ]; then
            resolved_release="$(git log --format=%s --grep='^feat: ship llama.cpp ' -n 1 | sed 's/^feat: ship llama.cpp //')"
          fi

          if [ -z "$resolved_release" ]; then
            resolved_release="latest"
          fi

          echo "Resolved llama.cpp release: $resolved_release"
          echo "release=$resolved_release" >> "$GITHUB_OUTPUT"
      - name: Download resolved llama.cpp release
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node ./dist/cli/cli.js source download --release "${{ steps.resolveLlamaCppRelease.outputs.release }}" --skipBuild --noBundle --noUsageExample --updateBinariesReleaseMetadataAndSaveGitBundle
      - name: Compile docs
        run: npm run docs:build
